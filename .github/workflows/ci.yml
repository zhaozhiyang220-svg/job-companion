name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter web lint
      - run: pnpm --filter web typecheck
      - run: pnpm --filter web test
      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: e2e
        run: pnpm --filter web e2e
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jc
          POSTGRES_PASSWORD: jc_dev
          POSTGRES_DB: jc_dev
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U jc"
          --health-interval=5s --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install WeasyPrint system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev libcairo2
      - name: Install deps
        working-directory: apps/api
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Generate field encryption key
        working-directory: apps/api
        run: echo "FIELD_ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> "$GITHUB_ENV"
      - name: Lint, typecheck, migrate, test
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+psycopg://jc:jc_dev@localhost:5432/jc_dev
          JWT_SECRET: ci-test-secret-32bytes-min-padding-pad
          APP_ENV: test
        run: |
          alembic upgrade head
          ruff check src tests
          mypy src
          pytest -q
